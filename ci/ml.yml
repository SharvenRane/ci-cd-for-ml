name: ml-pipeline

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  train-test-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Unit tests
        run: pytest tests/ -q

      - name: Train
        run: python src/train.py

      - name: Quality gate
        run: python src/quality_gate.py --metrics outputs/metrics.json

      - name: Upload model and metrics
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: outputs/
